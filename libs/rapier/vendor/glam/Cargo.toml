[package]
edition = "2021"
rust-version = "1.68.2"
name = "glam"
version = "0.30.10"
authors = ["Cameron Hart <cameron.hart@gmail.com>"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "A simple and fast 3D math library for games and graphics"
readme = "README.md"
keywords = [
    "gamedev",
    "math",
    "matrix",
    "vector",
    "quaternion",
]
categories = [
    "game-engines",
    "no-std",
]
license = "MIT OR Apache-2.0"
repository = "https://github.com/bitshifter/glam-rs"

[features]
arbitrary = []
bytecheck = []
core-simd = ["bytemuck?/nightly_portable_simd"]
cuda = []
debug-glam-assert = []
default = ["std"]
encase = []
fast-math = []
glam-assert = []
libm = ["dep:libm"]
mint = []
nostd-libm = ["dep:libm"]
rkyv = []
rand = []
scalar-math = []
serde = []
speedy = []
std = []
zerocopy = []

[lib]
name = "glam"
path = "src/lib.rs"
bench = false

[dependencies.approx]
version = "0.5"
optional = true
default-features = false
path = "../approx"
[dependencies.bytemuck]
version = "1.9"
features = [
    "derive",
    "aarch64_simd",
    "wasm_simd",
]
optional = true
default-features = false
path = "../../../../libs/bytemuck"
[dependencies.libm]
version = "0.2"
optional = true
default-features = false
path = "../libm"
[lints.rust.unexpected_cfgs]
level = "warn"
priority = 0
check-cfg = ['cfg(target_arch, values("spirv"))']
