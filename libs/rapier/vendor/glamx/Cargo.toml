[package]
edition = "2021"
name = "glamx"
version = "0.1.3"
authors = ["Sébastien Crozet <developer@crozet.re>"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "Extensions for glam: Pose2, Pose3, Rot2, and matrix utilities."
homepage = "https://dimforge.com"
documentation = "https://docs.rs/glamx"
readme = "README.md"
keywords = [
    "math",
    "geometry",
    "rotation",
    "pose",
    "glam",
]
categories = [
    "mathematics",
    "game-development",
    "no-std",
]
license = "MIT OR Apache-2.0"
repository = "https://github.com/dimforge/parry"

[features]
approx = [
    "dep:approx",
    "glam/approx",
]
bytemuck = [
    "dep:bytemuck",
    "glam/bytemuck",
]
cuda = ["glam/cuda"]
debug-glam-assert = ["glam/debug-glam-assert"]
default = ["std"]
encase = []
fast-math = ["glam/fast-math"]
glam-assert = ["glam/glam-assert"]
glamx-serde = []
libm = [
    "glam/libm",
    "simba/libm_force",
    "num-traits/libm",
]
mint = []
nalgebra = ["dep:nalgebra"]
nostd-libm = [
    "simba/libm",
    "glam/nostd-libm",
]
rand = []
rkyv = []
scalar-math = ["glam/scalar-math"]
serde = []
std = [
    "glam/std",
    "simba/std",
    "approx?/std",
]

[lib]
name = "glamx"
path = "src/lib.rs"

[dependencies.approx]
version = "0.5"
optional = true
default-features = false
path = "../approx"
[dependencies.bytemuck]
version = "1"
features = ["derive"]
optional = true
path = "../../../../libs/bytemuck"
[dependencies.glam]
version = "0.30"
default-features = false
path = "../glam"
[dependencies.nalgebra]
version = "0.34"
features = ["convert-glam030"]
optional = true
default-features = false
path = "../nalgebra"
[dependencies.num-traits]
version = "0.2"
features = ["libm"]
default-features = false
path = "../num-traits"
[dependencies.simba]
version = "0.9"
default-features = false
path = "../simba"
