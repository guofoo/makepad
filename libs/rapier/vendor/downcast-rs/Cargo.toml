[package]
edition = "2021"
rust-version = "1.56"
name = "downcast-rs"
version = "2.0.2"
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = """
Trait object downcasting support using only safe Rust. It supports type
parameters, associated types, and type constraints.
"""
readme = "README.md"
keywords = [
    "downcast",
    "any",
    "trait",
    "associated",
    "no_std",
]
categories = ["rust-patterns"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/marcianx/downcast-rs"

[features]
default = [
    "std",
    "sync",
]
std = []
sync = []

[lib]
name = "downcast_rs"
path = "src/lib.rs"
