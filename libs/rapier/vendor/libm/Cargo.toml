[package]
edition = "2021"
rust-version = "1.63"
name = "libm"
version = "0.2.16"
authors = [
    "Alex Crichton <alex@alexcrichton.com>",
    "Amanieu d'Antras <amanieu@gmail.com>",
    "Jorge Aparicio <japaricious@gmail.com>",
    "Trevor Gross <tg@trevorgross.com>",
]
build = "build.rs"
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "libm in pure Rust"
readme = "README.md"
keywords = [
    "libm",
    "math",
]
categories = ["no-std"]
license = "MIT"
repository = "https://github.com/rust-lang/compiler-builtins"

[features]
arch = []
default = ["arch"]
force-soft-floats = []
unstable = [
    "unstable-intrinsics",
    "unstable-float",
]
unstable-float = []
unstable-intrinsics = []
unstable-public-internals = []

[lib]
name = "libm"
path = "src/lib.rs"

[lints.rust.unexpected_cfgs]
level = "warn"
priority = 0
check-cfg = ['cfg(feature, values("compiler-builtins"))']
